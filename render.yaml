services:
  - type: web
    name: sylas-messenger-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PAGE_ACCESS_TOKEN
        sync: false
      - key: VERIFY_TOKEN
        value: sylas_bot_token
      - key: GROQ_API_KEY
        sync: false
